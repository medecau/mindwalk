name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, e.g. v0.2.0. Leave empty to use svu next."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Create semantic version tag
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git fetch --force --tags
          go install github.com/caarlos0/svu/v3@latest

          if [ -n "$REQUESTED_VERSION" ]; then
            next_tag="$REQUESTED_VERSION"
          else
            next_tag="$(svu next)"
          fi

          if ! printf '%s\n' "$next_tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid release version: $next_tag; expected vX.Y.Z" >&2
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/${next_tag}" >/dev/null; then
            echo "Tag ${next_tag} already exists." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${next_tag}" -m "Release ${next_tag}"
          git push origin "${next_tag}"

          echo "Created release tag ${next_tag}."

      - name: Publish release
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
