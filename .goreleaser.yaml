version: 2

project_name: mindwalk

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: mindwalk
    main: ./cmd/mindwalk
    binary: mindwalk
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: mindwalk
    ids:
      - mindwalk
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

release:
  github:
    owner: cosmtrek
    name: mindwalk
